global:
  out: ./artifacts
  manifest: parquet

inspect:
  top_n: 100

ingest:
  global:
    shard_size: 4096
    shard_prefix: tiles

  tiles:
    input: ./data/geotiffs
    tile_size: 512
    stride: 512
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 0.5
    p_high: 99.5

    stats: sample
    num_samples: 2048
    resume: true
