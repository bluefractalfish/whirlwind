global:
  version: "testing"
  in_dir: ./mnt
  dest_dir: ./artifacts
  log_dir: ./artifacts/log/

catalog:
  global:
    in_dir: ./mnt
  build:
    in_dir: ./mnt
    dest_dir: ./artifacts/metadata/
    file_name: catalog.csv
  stats:
    dest_dir: ./artifacts/metadata/
    file_name: metadata.csv
  validate:

mosaic:
  info: 
  footprint: 
  validate: 
  downsample:
    out: ./artifacts/browse/
    target_resolution: null
    target_width: null
    target_height: null
    overview_levels: null
    scale_factor: 0.278
    resampling: bilinear
    dtype: Byte
    compression: LZW
    tiled: true
    nodata: 0
    preserve_bounds: false

tile:
  cut:
    dest_dir: ./artifacts/tiles/
    tile_size: 512
    stride: null
    drop_partial: true
    shard_size: 2048
    shard_prefix: tiles
    manifest: csv
    dtype: float32
    scale: none
    p_low: 5.0
    p_high: 95.0
    per_band: true
    stats: sample
    num_samples: 1048
  label: 
  stats:
  verify: 

label:
  init: 
  validate:

pipeline:
  init: 
  build: 
