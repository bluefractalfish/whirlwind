global:
  version: v01.3
  in: ../_W/_S/
  out: experimental_artifacts
  manifest: csv
  log: ../_W/log/


ingest:
  global:
    shard_size: 2096
    shard_prefix: prefix

  tiles:
    tile_size: 264
    stride: 264
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 10
    p_high: 90
    per_band: false

    stats: sample
    num_samples: 2048

wrangle:
  global:
  mosaics.downsample:
    target_resolution: (1.0,1.0)
    resampling: bilinear
    dtype: Byte
    compression: LZW 
