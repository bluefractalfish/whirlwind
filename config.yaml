global:
  in: ../_W/_S/
  out: ../_W/artifacts
  manifest: csv
  log: ../_W/log/

inspect:
  top_n: 100

ingest:
  global:
    shard_size: 2096
    shard_prefix: prefix

  tiles:
    tile_size: 512
    stride: 512
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 2
    p_high: 98
    per_band: true

    stats: sample
    num_samples: 2048
