global:
  out: ./artifacts
  manifest: parquet

inspect:
  top_n: 100

ingest:
  global:
    shard_size: 4096
    shard_prefix: tiles

  tiles:
    input: ./metadata/*
    tile_size: 512
    stride: 512
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 2
    p_high: 98
    per_band: true

    stats: sample
    num_samples: 2048
