global:
  version: "V5"
  run_id: 2606
  io:
    in_dir: /home/rhea/dev/legacy/
    dest_dir: /home/rhea/A/artifacts/
  log_dir: ./artifacts/log/

manifest:
  global:
    in_dir: ./mnt
  build:
    file_name: manifest.csv
    exempt: 
        - artifacts
        - run_test
  meta:
    file_name: metadata.csv
  validate:

metamosaic: 
  build: 
    manifest_name: metamosaics.csv
    summary_name: metamosaic_summary.csv

operations: 
  downsample:
    scale_factor: 0.125
    resampling: nearest
    dtype: Byte
    compression: NONE
    tiled: true
    nodata: 0

    display:
      enabled: true
      method: percentile
      p_low: 2.0
      p_high: 98.0
      dst_min: 0
      dst_max: 255
      sample_windows: 128
      sample_size: 128

  tesselate: 
    shard_size: 2048
    shard_prefix: shard
    manifest_kind: csv 
    gpkg_name: geom.gpkg

plan: 
  tiles:
    tile_size: 512
    stride: 512
    drop_partial: true

classification: 
  spec: 
    model_name: ViT-B-32
    hf_repo: chendelong/RemoteCLIP
    device: cpu 
    layout: chw
    percent_lo: 2.0
    percent_hi: 98.0 
    mostly_threshold: 0.60 
    hybrid_second_threshold: 0.25 
    prefer_structures: true 
    structure_margin: 0.08 
    min_structure_score: 0.22
  checkpoints:
      cache_dir: /home/rhea/B/checkpoints
  rules:
    # used to create clear thresholds at which to consider a classification 
    # likely to be accurate or in need of review
    structures: 
      min_score: 0.55
      min_margin: 0.10 
      max_second: 0.30 
      max_review: 0.22
    roads: 
      min_score: 0.59
      min_margin: 0.12
      max_second: 0.28
      max_review: 0.20 
    tracks:
      min_score: 0.57
      min_margin: 0.11
      max_second: 0.29
      max_review: 0.21
    trees:
      min_score: 0.56
      min_margin: 0.10
      max_second: 0.30
      max_review: 0.22
    grass:
      min_score: 0.60
      min_margin: 0.12
      max_second: 0.26
      max_review: 0.20
    dirt:
      min_score: 0.60
      min_margin: 0.12
      max_second: 0.26
      max_review: 0.20
    crops: 
      min_score: 0.58
      min_margin: 0.12
      max_second: 0.28
      max_review: 0.20
    water: 
      min_score: 0.62
      min_margin: 0.10
      max_second: 0.24
      max_review: 0.18
    debris:  
      min_score: 0.50
      min_margin: 0.08
      max_second: 0.32
      max_review: 0.34 

segmentation:
  params:
    # for when masks miss small/skinny objects
    # higher = denser sampling, more time 
    points_per_side: 32
    
    # change for when too many bad masks
    # higher = keep only masks SAM thinks are better 
    # lower = more masks, more false positives
    pred_iou_thresh: 0.86
    
    # change when masks are too jagged 
    # higher = cleaner more stable masks 
    # lower = more permissive 
    stability_score_thresh: 0.92

    # change when small objects are missed 
    # 1 or 2 reruns prediction on image crops, often better for small objects. 
    crop_n_layers: 1

    # change when crops are too slow 
    crop_n_points_downscale_factor: 2 

    # change when spekles, holes, small junk masks
    # higher removes small disconeccted regions, holes
    min_mask_region_area: 64


    
