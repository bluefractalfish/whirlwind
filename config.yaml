global:
  version: "testing"
  run_id: run_t03
  io:
    in_dir: /home/rhea/B/
    dest_dir: /home/rhea/B/artifacts/
  log_dir: ./artifacts/log/

manifest:
  global:
    in_dir: ./mnt
  ids:
    file_name: manifest.csv
  meta:
    file_name: metadata.csv
  validate:

operations: 
  downsample:
    scale_factor: 0.25
    resampling: bilinear
    dtype: Byte
    compression: LZW
    tiled: true
    nodata: 0

    display:
      enabled: true
      method: percentile
      p_low: 2.0
      p_high: 98.0
      dst_min: 0
      dst_max: 255
      sample_windows: 512
      sample_size: 256
plan: 
  tiles:
    tile_size: 1024
    stride: 1024
    drop_partial: true

  shatter: 
    shard_size: 2048
    shard_prefix: tiles
    manifest: csv

tile:
  quantize:
    dtype: float32
    scale: none
    p_low: 5.0
    p_high: 95.0
    per_band: true
    stats: sample
    num_samples: 1048
