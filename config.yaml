global:
  out: ./artifacts
  manifest: parquet

inspect:
  top_n: 100

ingest:
  global:
    shard_size: 2096
    shard_prefix: prefix

  tiles:
    tile_size: 1024
    stride: 1024
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 2
    p_high: 98
    per_band: true

    stats: sample
    num_samples: 2048
