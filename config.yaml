global:
  version: v01.3
  in: ../_W/_S/
  out: ../_W/artifactos
  manifest: csv
  log: ../_W/log/

inspect:
  top_n: 100

ingest:
  global:
    shard_size: 2096
    shard_prefix: prefix

  tiles:
    tile_size: 264
    stride: 264
    drop_partial: true

    dtype: uint8
    scale: percentile
    p_low: 10
    p_high: 90
    per_band: false

    stats: sample
    num_samples: 2048
